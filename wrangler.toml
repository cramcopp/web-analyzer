"$schema" = "./node_modules/wrangler/config-schema.json"
name = "web-analyzer-pro"
account_id = "6b1c9a4b9789c88e2404ab19a9c43ffa"
main = ".open-next/worker.js"
compatibility_date = "2026-05-02"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
keep_vars = true

[vars]
NEXTJS_ENV = "production"
AI_REPORT_MODE = "budget"
AI_REPORT_MODELS = "gemini-3.1-flash-lite-preview,gemini-2.5-flash-lite,gemini-3-flash-preview"
AI_WORKFLOW_SUMMARY = "false"
AI_GATEWAY_ID = "default"
CLOUDFLARE_ACCOUNT_ID = "6b1c9a4b9789c88e2404ab19a9c43ffa"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 0.1

[ai]
binding = "AI"
remote = true

[[d1_databases]]
binding = "DB"
database_name = "web-analyzer-db"
database_id = "4eff0a12-8113-495d-a832-7ae63dfbd5e7"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AUDIT_ARTIFACTS"
bucket_name = "web-analyzer-audit-artifacts"

[[r2_buckets]]
binding = "REPORT_EXPORTS"
bucket_name = "web-analyzer-report-exports"

[[kv_namespaces]]
binding = "CACHE"
id = "a8fbe2bbbf1243248c1c236cb21d96db"

[queues]
[[queues.producers]]
binding = "SCAN_FANOUT_QUEUE"
queue = "web-analyzer-scan-fanout"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "web-analyzer-pro"

[[services]]
binding = "SCAN_WORKFLOW_SERVICE"
service = "scan-workflow"
