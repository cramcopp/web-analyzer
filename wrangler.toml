"$schema" = "./node_modules/wrangler/config-schema.json"
name = "web-analyzer-pro"
account_id = "6b1c9a4b9789c88e2404ab19a9c43ffa"
main = ".open-next/worker.js"
compatibility_date = "2026-05-02"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
keep_vars = true

[vars]
NEXTJS_ENV = "production"
AI_REPORT_MODE = "budget"
AI_WORKFLOW_SUMMARY = "false"
AI_GATEWAY_ID = "default"
CLOUDFLARE_ACCOUNT_ID = "6b1c9a4b9789c88e2404ab19a9c43ffa"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 0.1

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "web-analyzer-pro"

[[services]]
binding = "SCAN_WORKFLOW_SERVICE"
service = "scan-workflow"
