"$schema" = "./node_modules/wrangler/config-schema.json"
name = "scan-workflow"
account_id = "6b1c9a4b9789c88e2404ab19a9c43ffa"
main = "lib/workflow-scanner.ts"
compatibility_date = "2026-05-02"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
keep_vars = true

[vars]
AI_WORKFLOW_SUMMARY = "false"

[observability]
enabled = true
head_sampling_rate = 0.1

[[d1_databases]]
binding = "DB"
database_name = "web-analyzer-db"
database_id = "4eff0a12-8113-495d-a832-7ae63dfbd5e7"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AUDIT_ARTIFACTS"
bucket_name = "web-analyzer-audit-artifacts"

[[r2_buckets]]
binding = "REPORT_EXPORTS"
bucket_name = "web-analyzer-report-exports"

[[kv_namespaces]]
binding = "CACHE"
id = "a8fbe2bbbf1243248c1c236cb21d96db"

[queues]
[[queues.producers]]
binding = "SCAN_FANOUT_QUEUE"
queue = "web-analyzer-scan-fanout"

[[workflows]]
binding = "SCAN_WORKFLOW"
name = "scan-workflow"
class_name = "ScanWorkflow"
